<!DOCTYPE html>
<html>
<head>
  <title>StoNyService</title>

  <style>
    body{margin:0;font-family:Arial;background:#f4f4f4}

    .top{
      background:black;
      color:white;
      padding:15px;
      text-align:center;
      font-weight:bold;
    }

    .tabs{
      display:flex;
    }

    .tabs button{
      flex:1;
      padding:15px;
      border:none;
      cursor:pointer;
      background:#222;
      color:white;
    }

    .active{background:orange;color:black;font-weight:bold}

    .section{display:none;padding:20px}
    .show{display:block}

    /* STORE */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    .card{
      background:white;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      height:160px;
      object-fit:cover;
    }

    .body{padding:10px}

    .price{
      color:green;
      font-weight:bold;
      font-size:18px;
    }

    .desc{
      font-size:13px;
      color:#555;
    }

    button.buy{
      width:100%;
      padding:10px;
      background:orange;
      border:none;
      font-weight:bold;
      cursor:pointer;
      margin-top:5px;
    }

    /* ADMIN */
    .admin{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    .box{
      background:#111;
      color:white;
      padding:15px;
      border-radius:10px;
    }

    input{
      width:100%;
      padding:10px;
      margin:5px 0;
    }

    .order{
      background:#222;
      padding:10px;
      margin:5px 0;
      color:white;
    }
  </style>
</head>

<body>

<div class="top">🔥 STO NY SERVICE SYSTEM</div>

<div class="tabs">
  <button onclick="openTab('store')" class="active">STORE</button>
  <button onclick="openTab('admin')">ADMIN</button>
</div>

<!-- STORE -->
<div id="store" class="section show">

  <h2>🛒 Products</h2>
  <div id="products" class="grid"></div>

  <h3>📦 Track Order</h3>
  <input id="trackPhone" placeholder="Phone">
  <button onclick="track()">Track</button>
  <div id="result"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="section">

  <div class="admin">

    <div class="box">
      <h3>Upload Product</h3>

      <input id="name" placeholder="Name">
      <input id="image" placeholder="Image URL">
      <input id="price" placeholder="Price">
      <input id="size" placeholder="Size">
      <input id="description" placeholder="Description">

      <button onclick="upload()">Upload</button>
    </div>

    <div class="box">
      <h3>Orders</h3>
      <div id="orders"></div>
    </div>

  </div>

</div>

<script>

function openTab(tab){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
  document.getElementById(tab).classList.add("show");
}

/* ========== PRODUCTS ========== */
async function loadProducts(){
  let res = await fetch("/products");
  let data = await res.json();

  products.innerHTML = data.map(p=>`
    <div class="card">
      <img src="${p.image}">
      <div class="body">
        <h3>${p.name}</h3>
        <p class="desc">${p.description || ""}</p>
        <p class="price">₵${p.price}</p>

        <button class="buy" onclick="
          pname.value='${p.name}';
          alert('Selected product');
        ">
          Place Order
        </button>
      </div>
    </div>
  `).join("");
}

loadProducts();

/* ========== UPLOAD ========== */
async function upload(){
  await fetch("/products",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      name:name.value,
      image:image.value,
      price:price.value,
      size:size.value,
      description:description.value
    })
  });

  alert("Uploaded");
  loadProducts();
}

/* ========== ORDER ========== */
async function order(){
  await fetch("/orders",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      name:pname.value,
      phone:phone.value,
      location:location.value
    })
  });

  alert("Order sent");
}

/* ========== TRACK ========== */
async function track(){
  let res = await fetch("/orders");
  let data = await res.json();

  let found = data.filter(o=>o.phone===trackPhone.value);

  result.innerHTML = found.length
    ? found.map(o=>`<p>${o.name} - ${o.status}</p>`).join("")
    : "No order found";
}

/* ========== ADMIN ORDERS ========== */
async function loadOrders(){
  let res = await fetch("/orders");
  let data = await res.json();

  orders.innerHTML = data.map(o=>`
    <div class="order">
      ${o.name}<br>
      ${o.phone}<br>
      ${o.location}<br>
      Status: ${o.status || "Pending"}<br>
      <button onclick="deliver(${o.id})">Deliver</button>
    </div>
  `).join("");
}

async function deliver(id){
  await fetch("/orders/"+id,{
    method:"PATCH",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ status:"Delivered" })
  });

  loadOrders();
}

loadOrders();

</script>

</body>
</html>
